<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Camera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Sora:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'IBM Plex Mono', monospace;
            overflow: hidden;
        }

        #video-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100vh;
        }

        video {
            display: block;
            max-width: 100%;
            max-height: 100vh;
        }

        #name-overlay {
            position: absolute;
            top: 18px;
            left: 18px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: none;
        }

        #overlay-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.14em;
            color: #3fff8f;
            text-transform: uppercase;
            opacity: 0.7;
        }

        #overlay-label.unknown { color: #888; }

        #overlay-name {
            font-family: 'Sora', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.9);
            letter-spacing: -0.01em;
        }

        #overlay-name.unknown { color: #888; font-weight: 300; }

        #overlay-booking {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: #3fff8f;
            opacity: 0.8;
        }

        #toast {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: #3fff8f;
            background: rgba(0,0,0,0.75);
            border: 1px solid rgba(63,255,143,0.25);
            border-radius: 4px;
            padding: 6px 14px;
            opacity: 0;
            transition: opacity 0.35s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
        }

        #toast.error { color: #ff6b35; border-color: rgba(255,107,53,0.3); }
        #toast.show { opacity: 1; }

        #action-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .action-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: none;
            border-radius: 4px;
            padding: 10px 22px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .action-btn:active { transform: scale(0.96); }

        .action-btn:disabled {
            opacity: 0.38;
            cursor: not-allowed;
            transform: none;
        }

        #checkin-btn {
            background: #3fff8f;
            color: #050505;
        }

        #checkin-btn:hover:not(:disabled) { opacity: 0.85; }

        #checkout-btn {
            background: #ff6b35;
            color: #fff;
            display: none;
        }

        #checkout-btn:hover:not(:disabled) { opacity: 0.85; }

        #status {
            color: #444;
            font: 11px 'IBM Plex Mono', monospace;
            margin-top: 10px;
            letter-spacing: 0.05em;
        }

        #loader {
            color: #2a2a2a;
            font: 10px 'IBM Plex Mono', monospace;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="video-wrapper">
        <video id="video" autoplay playsinline muted></video>

        <div id="name-overlay">
            <span id="overlay-label">Guest</span>
            <span id="overlay-name">—</span>
            <span id="overlay-booking"></span>
        </div>

        <div id="toast"></div>

        <div id="action-bar">
            <button id="checkin-btn" class="action-btn" disabled>✓ Check In</button>
            <button id="checkout-btn" class="action-btn">↩ Check Out</button>
        </div>
    </div>

    <div id="status">Initializing...</div>
    <div id="loader" style="display:none">loading...</div>

    <script src="webrtcclient.js"></script>
</body>
</html>
